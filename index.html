<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#16213e">
    <title>Choose Your Own Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            overflow: hidden;
            position: fixed;
        }

        body {
            overflow: hidden;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-color: #16213e;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        #canvas {
            flex: 1;
            display: block;
            background-color: #0f3460;
            width: 100%;
            height: 100%;
            max-height: calc(100vh - 140px);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }

        #textBox {
            background-color: #10121b;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-top: 2px solid #2f4d8f;
            overflow: visible;
            flex-shrink: 0;
            min-height: 140px;
            max-height: 30vh;
        }

        #title {
            font-size: 16px;
            font-weight: bold;
            color: #f5f6ff;
            line-height: 1.2;
        }

        #storyText {
            font-size: 13px;
            color: #e8ebff;
            line-height: 1.3;
            flex: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        #choicesContainer {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow: visible;
        }

        .choiceButton {
            padding: 10px 8px;
            background-color: #2f4d8f;
            color: #ffffff;
            border: 2px solid #1f3d6f;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            flex: 1;
            min-width: 100px;
            text-align: center;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .choiceButton:active {
            background-color: #2f6fbf;
            border-color: #4f9dff;
            transform: scale(0.97);
        }

        .choiceButton:hover {
            background-color: #2f6fbf;
            border-color: #4f9dff;
        }

        @media (max-width: 1024px) {
            .choiceButton {
                font-size: 10px;
                min-width: 90px;
                padding: 9px 6px;
            }
        }

        @media (max-width: 768px) {
            #textBox {
                padding: 8px 10px;
                gap: 5px;
                min-height: 130px;
            }

            #title {
                font-size: 14px;
            }

            #storyText {
                font-size: 12px;
                -webkit-line-clamp: 3;
            }

            .choiceButton {
                font-size: 10px;
                min-width: 80px;
                padding: 8px 5px;
                flex: 1 1 calc(50% - 4px);
            }
        }

        @media (max-width: 480px) {
            #textBox {
                padding: 8px 8px;
                gap: 4px;
                min-height: 120px;
                max-height: 35vh;
            }

            #title {
                font-size: 13px;
                line-height: 1.1;
            }

            #storyText {
                font-size: 11px;
                line-height: 1.2;
                -webkit-line-clamp: 2;
            }

            .choiceButton {
                font-size: 9px;
                min-width: 70px;
                padding: 7px 4px;
                flex: 1 1 calc(50% - 4px);
            }
        }

        @supports (padding: max(0px)) {
            #textBox {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="textBox">
            <div id="title"></div>
            <div id="storyText"></div>
            <div id="choicesContainer"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const titleEl = document.getElementById('title');
        const storyEl = document.getElementById('storyText');
        const choicesEl = document.getElementById('choicesContainer');

        let currentScene = 'intro';
        let audioContextReady = false;
        let audioContext = null;

        const SCENES = {
            intro: {
                title: 'Mystic Forest',
                text: 'You wake up in a misty forest with glowing mushrooms. A path stretches into the distance, while shadows rustle in the trees.',
                background: 'forest',
                character: 'hero',
                sound: 'bgm',
                choices: [
                    { text: 'Follow the glowing path', target: 'castle' },
                    { text: 'Hide and wait', target: 'cave' }
                ]
            },
            castle: {
                title: 'Castle Gate',
                text: 'A friendly wizard greets you at the castle gate and offers to guide you. You feel a warm energy around you.',
                background: 'castle',
                character: 'wizard',
                sound: 'bgm',
                choices: [
                    { text: 'Accept the wizard\'s help', target: 'peace' },
                    { text: 'Explore the tower alone', target: 'danger' }
                ]
            },
            cave: {
                title: 'Hidden Cave',
                text: 'You crouch behind a mossy tree and discover a cave entrance. A creature stirs inside, and the air grows cold.',
                background: 'cave',
                character: 'goblin',
                sound: 'bgm',
                choices: [
                    { text: 'Sneak inside', target: 'danger' },
                    { text: 'Run back to the path', target: 'castle' }
                ]
            },
            peace: {
                title: 'A New Beginning',
                text: 'With the wizard\'s guidance, you step into a bright future. The adventure has only just begun.',
                background: 'castle',
                character: 'hero',
                sound: 'click',
                choices: [
                    { text: 'Play again', target: 'intro' }
                ]
            },
            danger: {
                title: 'Danger Awaits',
                text: 'A shadow leaps from the darkness. You have entered a challenge that will test your courage.',
                background: 'cave',
                character: 'goblin',
                sound: 'click',
                choices: [
                    { text: 'Try again', target: 'intro' }
                ]
            }
        };

        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const textBox = document.getElementById('textBox');
            const textBoxHeight = textBox.offsetHeight;
            const containerHeight = container.offsetHeight;
            const containerWidth = container.offsetWidth;
            
            canvas.width = containerWidth;
            canvas.height = Math.max(200, containerHeight - textBoxHeight);
        }

        function initAudioContext() {
            if (audioContextReady) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioContextReady = true;
            } catch (e) {
                console.log('Audio not available');
            }
        }

        // Drawing functions for backgrounds
        function drawForest() {
            const w = canvas.width;
            const h = canvas.height;
            
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#70abd8');
            grad.addColorStop(1, '#3e5a6b');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = '#3e5a2d';
            ctx.fillRect(0, h * 0.75, w, h * 0.25);

            const treeScale = Math.max(0.3, w / 1000);
            
            ctx.fillStyle = '#5c3a18';
            ctx.fillRect(30 * treeScale, h * 0.45, 80 * treeScale, h * 0.55);
            ctx.fillStyle = '#2a7037';
            ctx.beginPath();
            ctx.arc(70 * treeScale, h * 0.45, 50 * treeScale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#5c3a18';
            ctx.fillRect(540 * treeScale, h * 0.4, 80 * treeScale, h * 0.6);
            ctx.fillStyle = '#2a7037';
            ctx.beginPath();
            ctx.arc(580 * treeScale, h * 0.4, 55 * treeScale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 241, 171, 0.3)';
            ctx.beginPath();
            ctx.arc(w / 2, h * 0.2, 80 * treeScale, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCave() {
            const w = canvas.width;
            const h = canvas.height;
            const scale = Math.max(0.3, w / 1000);

            ctx.fillStyle = '#363a49';
            ctx.fillRect(0, 0, w, h * 0.7);

            ctx.fillStyle = '#2e2826';
            ctx.fillRect(0, h * 0.7, w, h * 0.3);

            ctx.fillStyle = '#16161b';
            ctx.beginPath();
            ctx.ellipse(w / 2, h * 0.55, 140 * scale, 100 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#0a0a0d';
            ctx.lineWidth = Math.max(1, 3 * scale);
            ctx.stroke();

            ctx.fillStyle = '#0c0c0e';
            ctx.beginPath();
            ctx.ellipse(w / 2, h * 0.55, 80 * scale, 60 * scale, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCastle() {
            const w = canvas.width;
            const h = canvas.height;
            const scale = Math.max(0.3, w / 1000);

            ctx.fillStyle = '#8ec6ff';
            ctx.fillRect(0, 0, w, h * 0.85);

            ctx.fillStyle = '#625f4e';
            ctx.fillRect(0, h * 0.85, w, h * 0.15);

            ctx.fillStyle = '#cdcddee';
            ctx.fillRect(520 * scale, h * 0.45, 120 * scale, h * 0.4);

            ctx.fillStyle = '#5c3a18';
            ctx.beginPath();
            ctx.moveTo(520 * scale, h * 0.45);
            ctx.lineTo(580 * scale, h * 0.2);
            ctx.lineTo(640 * scale, h * 0.45);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#babadb';
            ctx.fillRect(670 * scale, h * 0.4, 90 * scale, h * 0.45);

            ctx.fillStyle = '#5c3a18';
            ctx.beginPath();
            ctx.moveTo(670 * scale, h * 0.4);
            ctx.lineTo(715 * scale, h * 0.15);
            ctx.lineTo(760 * scale, h * 0.4);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#5c1e32';
            ctx.fillRect(580 * scale, h * 0.6, 40 * scale, h * 0.25);
        }

        function drawHero(x, y) {
            const scale = Math.max(0.4, canvas.width / 1000);
            ctx.fillStyle = '#f3cb9c';
            ctx.beginPath();
            ctx.arc(x + 40 * scale, y + 40 * scale, 22 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#375dc4';
            ctx.fillRect(x + 20 * scale, y + 65 * scale, 40 * scale, 40 * scale);

            ctx.fillStyle = '#1f2a3d';
            ctx.fillRect(x + 25 * scale, y + 110 * scale, 30 * scale, 60 * scale);
        }

        function drawWizard(x, y) {
            const scale = Math.max(0.4, canvas.width / 1000);
            ctx.fillStyle = '#2c1861';
            ctx.beginPath();
            ctx.moveTo(x + 20 * scale, y + 60 * scale);
            ctx.lineTo(x + 40 * scale, y + 10 * scale);
            ctx.lineTo(x + 60 * scale, y + 60 * scale);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#ffd7ba';
            ctx.beginPath();
            ctx.arc(x + 40 * scale, y + 65 * scale, 20 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#5b83de';
            ctx.fillRect(x + 15 * scale, y + 85 * scale, 50 * scale, 50 * scale);

            ctx.strokeStyle = '#5c7a2f';
            ctx.lineWidth = Math.max(1, 8 * scale);
            ctx.beginPath();
            ctx.moveTo(x + 70 * scale, y + 85 * scale);
            ctx.lineTo(x + 70 * scale, y + 150 * scale);
            ctx.stroke();
        }

        function drawGoblin(x, y) {
            const scale = Math.max(0.4, canvas.width / 1000);
            ctx.fillStyle = '#92c045';
            ctx.beginPath();
            ctx.arc(x + 40 * scale, y + 40 * scale, 20 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x + 20 * scale, y + 25 * scale, 8 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 60 * scale, y + 25 * scale, 8 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#587c2d';
            ctx.fillRect(x + 20 * scale, y + 60 * scale, 40 * scale, 50 * scale);

            ctx.fillStyle = '#1a1a1c';
            ctx.fillRect(x + 25 * scale, y + 115 * scale, 12 * scale, 40 * scale);
            ctx.fillRect(x + 43 * scale, y + 115 * scale, 12 * scale, 40 * scale);
        }

        function playNote(frequency, duration, volume = 0.3) {
            if (!audioContextReady || !audioContext) return;
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = frequency;
                osc.type = 'sine';
                
                gain.gain.setValueAtTime(volume, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + duration);
            } catch (e) {
                console.log('Audio play error:', e);
            }
        }

        function playSound(soundType) {
            initAudioContext();
            if (soundType === 'bgm') {
                playNote(220, 0.4, 0.08);
                setTimeout(() => playNote(262, 0.4, 0.08), 120);
                setTimeout(() => playNote(330, 0.4, 0.08), 240);
                setTimeout(() => playNote(392, 0.4, 0.08), 360);
            } else if (soundType === 'click') {
                playNote(440, 0.08, 0.1);
                setTimeout(() => playNote(660, 0.08, 0.1), 40);
            }
        }

        function drawScene(sceneKey) {
            const scene = SCENES[sceneKey];

            if (scene.background === 'forest') drawForest();
            else if (scene.background === 'cave') drawCave();
            else if (scene.background === 'castle') drawCastle();

            const charX = Math.max(0, canvas.width - 180);
            const charY = Math.max(0, canvas.height - 240);
            if (scene.character === 'hero') drawHero(charX, charY);
            else if (scene.character === 'wizard') drawWizard(charX, charY);
            else if (scene.character === 'goblin') drawGoblin(charX, charY);

            titleEl.textContent = scene.title;
            storyEl.textContent = scene.text;

            choicesEl.innerHTML = '';
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choiceButton';
                btn.textContent = choice.text;
                btn.onclick = () => {
                    playSound('click');
                    goToScene(choice.target);
                };
                choicesEl.appendChild(btn);
            });

            if (scene.sound) {
                playSound(scene.sound);
            }
        }

        function goToScene(sceneKey) {
            currentScene = sceneKey;
            drawScene(sceneKey);
        }

        function handleResize() {
            resizeCanvas();
            drawScene(currentScene);
        }

        window.addEventListener('load', () => {
            resizeCanvas();
            drawScene('intro');
        });

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', handleResize);
        
        document.addEventListener('touchstart', () => {
            initAudioContext();
        }, { once: true });

        document.addEventListener('click', () => {
            initAudioContext();
        }, { once: true });
    </script>
</body>

<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="textBox">
            <div id="title"></div>
            <div id="storyText"></div>
            <div id="choicesContainer"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const titleEl = document.getElementById('title');
        const storyEl = document.getElementById('storyText');
        const choicesEl = document.getElementById('choicesContainer');

        let currentScene = 'intro';

        const SCENES = {
            intro: {
                title: 'Mystic Forest',
                text: 'You wake up in a misty forest with glowing mushrooms. A path stretches into the distance, while shadows rustle in the trees.',
                background: 'forest',
                character: 'hero',
                sound: 'bgm',
                choices: [
                    { text: 'Follow the glowing path', target: 'castle' },
                    { text: 'Hide and wait', target: 'cave' }
                ]
            },
            castle: {
                title: 'Castle Gate',
                text: 'A friendly wizard greets you at the castle gate and offers to guide you. You feel a warm energy around you.',
                background: 'castle',
                character: 'wizard',
                sound: 'bgm',
                choices: [
                    { text: 'Accept the wizard\'s help', target: 'peace' },
                    { text: 'Explore the tower alone', target: 'danger' }
                ]
            },
            cave: {
                title: 'Hidden Cave',
                text: 'You crouch behind a mossy tree and discover a cave entrance. A creature stirs inside, and the air grows cold.',
                background: 'cave',
                character: 'goblin',
                sound: 'bgm',
                choices: [
                    { text: 'Sneak inside', target: 'danger' },
                    { text: 'Run back to the path', target: 'castle' }
                ]
            },
            peace: {
                title: 'A New Beginning',
                text: 'With the wizard\'s guidance, you step into a bright future. The adventure has only just begun.',
                background: 'castle',
                character: 'hero',
                sound: 'click',
                choices: [
                    { text: 'Play again', target: 'intro' }
                ]
            },
            danger: {
                title: 'Danger Awaits',
                text: 'A shadow leaps from the darkness. You have entered a challenge that will test your courage.',
                background: 'cave',
                character: 'goblin',
                sound: 'click',
                choices: [
                    { text: 'Try again', target: 'intro' }
                ]
            }
        };

        function resizeCanvas() {
            const textBoxHeight = document.getElementById('textBox').offsetHeight;
            const availableHeight = window.innerHeight - textBoxHeight;
            canvas.width = window.innerWidth;
            canvas.height = Math.max(300, availableHeight);
        }

        // Drawing functions for backgrounds
        function drawForest() {
            const w = canvas.width;
            const h = canvas.height;
            
            // Sky gradient
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#70abd8');
            grad.addColorStop(1, '#3e5a6b');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Ground
            ctx.fillStyle = '#3e5a2d';
            ctx.fillRect(0, h * 0.75, w, h * 0.25);

            // Trees (scaled)
            const treeScale = Math.max(0.5, w / 1000);
            
            ctx.fillStyle = '#5c3a18';
            ctx.fillRect(30 * treeScale, h * 0.45, 80 * treeScale, h * 0.55);
            ctx.fillStyle = '#2a7037';
            ctx.beginPath();
            ctx.arc(70 * treeScale, h * 0.45, 50 * treeScale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#5c3a18';
            ctx.fillRect(540 * treeScale, h * 0.4, 80 * treeScale, h * 0.6);
            ctx.fillStyle = '#2a7037';
            ctx.beginPath();
            ctx.arc(580 * treeScale, h * 0.4, 55 * treeScale, 0, Math.PI * 2);
            ctx.fill();

            // Sun/moon glow
            ctx.fillStyle = 'rgba(255, 241, 171, 0.3)';
            ctx.beginPath();
            ctx.arc(400 * treeScale, h * 0.2, 80 * treeScale, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCave() {
            const w = canvas.width;
            const h = canvas.height;
            const scale = Math.max(0.5, w / 1000);

            // Sky
            ctx.fillStyle = '#363a49';
            ctx.fillRect(0, 0, w, h * 0.7);

            // Ground
            ctx.fillStyle = '#2e2826';
            ctx.fillRect(0, h * 0.7, w, h * 0.3);

            // Cave entrance
            ctx.fillStyle = '#16161b';
            ctx.beginPath();
            ctx.ellipse(w / 2, h * 0.55, 140 * scale, 100 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#0a0a0d';
            ctx.lineWidth = 3 * scale;
            ctx.stroke();

            // Cave opening details
            ctx.fillStyle = '#0c0c0e';
            ctx.beginPath();
            ctx.ellipse(w / 2, h * 0.55, 80 * scale, 60 * scale, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCastle() {
            const w = canvas.width;
            const h = canvas.height;
            const scale = Math.max(0.5, w / 1000);

            // Sky
            ctx.fillStyle = '#8ec6ff';
            ctx.fillRect(0, 0, w, h * 0.85);

            // Ground
            ctx.fillStyle = '#625f4e';
            ctx.fillRect(0, h * 0.85, w, h * 0.15);

            // Castle body
            ctx.fillStyle = '#cdcddee';
            ctx.fillRect(520 * scale, h * 0.45, 120 * scale, h * 0.4);

            // Castle roof
            ctx.fillStyle = '#5c3a18';
            ctx.beginPath();
            ctx.moveTo(520 * scale, h * 0.45);
            ctx.lineTo(580 * scale, h * 0.2);
            ctx.lineTo(640 * scale, h * 0.45);
            ctx.closePath();
            ctx.fill();

            // Tower
            ctx.fillStyle = '#babadb';
            ctx.fillRect(670 * scale, h * 0.4, 90 * scale, h * 0.45);

            // Tower roof
            ctx.fillStyle = '#5c3a18';
            ctx.beginPath();
            ctx.moveTo(670 * scale, h * 0.4);
            ctx.lineTo(715 * scale, h * 0.15);
            ctx.lineTo(760 * scale, h * 0.4);
            ctx.closePath();
            ctx.fill();

            // Door
            ctx.fillStyle = '#5c1e32';
            ctx.fillRect(580 * scale, h * 0.6, 40 * scale, h * 0.25);
        }

        // Drawing functions for characters
        function drawHero(x, y) {
            const scale = canvas.width / 960;
            ctx.fillStyle = '#f3cb9c';
            ctx.beginPath();
            ctx.arc(x + 40 * scale, y + 40 * scale, 22 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#375dc4';
            ctx.fillRect(x + 20 * scale, y + 65 * scale, 40 * scale, 40 * scale);

            ctx.fillStyle = '#1f2a3d';
            ctx.fillRect(x + 25 * scale, y + 110 * scale, 30 * scale, 60 * scale);
        }

        function drawWizard(x, y) {
            const scale = canvas.width / 960;
            // Hat
            ctx.fillStyle = '#2c1861';
            ctx.beginPath();
            ctx.moveTo(x + 20 * scale, y + 60 * scale);
            ctx.lineTo(x + 40 * scale, y + 10 * scale);
            ctx.lineTo(x + 60 * scale, y + 60 * scale);
            ctx.closePath();
            ctx.fill();

            // Head
            ctx.fillStyle = '#ffd7ba';
            ctx.beginPath();
            ctx.arc(x + 40 * scale, y + 65 * scale, 20 * scale, 0, Math.PI * 2);
            ctx.fill();

            // Robes
            ctx.fillStyle = '#5b83de';
            ctx.fillRect(x + 15 * scale, y + 85 * scale, 50 * scale, 50 * scale);

            // Staff
            ctx.strokeStyle = '#5c7a2f';
            ctx.lineWidth = 8 * scale;
            ctx.beginPath();
            ctx.moveTo(x + 70 * scale, y + 85 * scale);
            ctx.lineTo(x + 70 * scale, y + 150 * scale);
            ctx.stroke();
        }

        function drawGoblin(x, y) {
            const scale = canvas.width / 960;
            ctx.fillStyle = '#92c045';
            // Head
            ctx.beginPath();
            ctx.arc(x + 40 * scale, y + 40 * scale, 20 * scale, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.fillStyle = '#92c045';
            ctx.beginPath();
            ctx.arc(x + 20 * scale, y + 25 * scale, 8 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 60 * scale, y + 25 * scale, 8 * scale, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = '#587c2d';
            ctx.fillRect(x + 20 * scale, y + 60 * scale, 40 * scale, 50 * scale);

            // Legs
            ctx.fillStyle = '#1a1a1c';
            ctx.fillRect(x + 25 * scale, y + 115 * scale, 12 * scale, 40 * scale);
            ctx.fillRect(x + 43 * scale, y + 115 * scale, 12 * scale, 40 * scale);
        }

        // Audio context for procedural sounds
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playNote(frequency, duration, volume = 0.3) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.value = frequency;
            osc.type = 'sine';
            
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }

        function playSound(soundType) {
            if (soundType === 'bgm') {
                playNote(220, 0.5, 0.1);
                setTimeout(() => playNote(262, 0.5, 0.1), 150);
                setTimeout(() => playNote(330, 0.5, 0.1), 300);
                setTimeout(() => playNote(392, 0.5, 0.1), 450);
            } else if (soundType === 'click') {
                playNote(440, 0.1, 0.15);
                setTimeout(() => playNote(660, 0.1, 0.15), 50);
            }
        }

        function drawScene(sceneKey) {
            const scene = SCENES[sceneKey];

            // Draw background
            if (scene.background === 'forest') drawForest();
            else if (scene.background === 'cave') drawCave();
            else if (scene.background === 'castle') drawCastle();

            // Draw character (positioned on the right side)
            const charX = canvas.width - 220;
            const charY = canvas.height - 280;
            if (scene.character === 'hero') drawHero(charX, charY);
            else if (scene.character === 'wizard') drawWizard(charX, charY);
            else if (scene.character === 'goblin') drawGoblin(charX, charY);

            // Update text
            titleEl.textContent = scene.title;
            storyEl.textContent = scene.text;

            // Update choices
            choicesEl.innerHTML = '';
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choiceButton';
                btn.textContent = choice.text;
                btn.onclick = () => {
                    playSound('click');
                    goToScene(choice.target);
                };
                choicesEl.appendChild(btn);
            });

            // Play sound
            if (scene.sound) {
                playSound(scene.sound);
            }
        }

        function goToScene(sceneKey) {
            currentScene = sceneKey;
            drawScene(sceneKey);
        }

        // Initialize game
        resizeCanvas();
        drawScene('intro');

        // Handle window resize
        window.addEventListener('resize', () => {
            resizeCanvas();
            drawScene(currentScene);
        });
    </script>
</body>
</html>
