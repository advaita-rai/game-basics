<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#16213e">
    <title>Choose Your Own Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            height: 100dvh;
            font-family: Arial, sans-serif;
            background: #0a0e1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 100dvh;
            background: #16213e;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        #canvas {
            flex: 1;
            display: block;
            background: #0f3460;
            width: 100%;
            min-height: 0;
            image-rendering: crisp-edges;
        }

        #textBox {
            flex-shrink: 0;
            background: #10121b;
            border-top: 2px solid #2f4d8f;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 25vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #title {
            font-size: 14px;
            font-weight: bold;
            color: #f5f6ff;
        }

        #storyText {
            font-size: 12px;
            color: #e8ebff;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        #choicesContainer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .choiceButton {
            padding: 8px 6px;
            background: #2f4d8f;
            color: #fff;
            border: 2px solid #1f3d6f;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .choiceButton:active {
            background: #1f6fbf;
            transform: scale(0.95);
        }

        @media (max-width: 480px) {
            #title { font-size: 12px; }
            #storyText { 
                font-size: 11px;
                -webkit-line-clamp: 2;
            }
            .choiceButton { font-size: 9px; padding: 6px 4px; }
            #choicesContainer { grid-template-columns: 1fr; }
            #textBox {
                max-height: 20vh;
                padding: 6px;
                gap: 2px;
            }
        }
    </style>
</head>

        function resizeCanvas() {
            const textBox = document.getElementById('textBox');
            const container = document.getElementById('gameContainer');
            
            // Get actual computed dimensions
            const containerHeight = container.clientHeight;
            const textBoxHeight = textBox.offsetHeight;
            const canvasHeight = containerHeight - textBoxHeight;
            
            canvas.width = window.innerWidth;
            canvas.height = Math.max(canvasHeight, 100);
            
            drawScene(currentScene);
        }

        function initAudio() {
            if (audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.log('Audio unavailable');
            }
        }

        function playTone(freq, dur) {
            if (!audioContext) return;
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + dur);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + dur);
            } catch (e) {}
        }

        function drawForest() {
            const w = canvas.width;
            const h = canvas.height;
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#87ceeb');
            grad.addColorStop(0.5, '#87ceeb');
            grad.addColorStop(1, '#228b22');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            
            // Grass
            ctx.fillStyle = '#2d5016';
            ctx.fillRect(0, h * 0.6, w, h * 0.4);
            
            // Trees
            ctx.fillStyle = '#654321';
            ctx.fillRect(w * 0.1, h * 0.3, 40, h * 0.3);
            ctx.fillStyle = '#228b22';
            ctx.beginPath();
            ctx.arc(w * 0.1 + 20, h * 0.25, 60, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#654321';
            ctx.fillRect(w * 0.8, h * 0.35, 30, h * 0.25);
            ctx.fillStyle = '#2d5016';
            ctx.beginPath();
            ctx.arc(w * 0.8 + 15, h * 0.28, 50, 0, Math.PI * 2);
            ctx.fill();
            
            // Mushrooms
            ctx.fillStyle = '#ff69b4';
            ctx.beginPath();
            ctx.arc(w * 0.3, h * 0.65, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffff99';
            ctx.beginPath();
            ctx.arc(w * 0.3, h * 0.65, 10, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffff99';
            ctx.beginPath();
            ctx.arc(w * 0.5, h * 0.7, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCave() {
            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = '#4a4a54';
            ctx.fillRect(0, 0, w, h);
            
            // Cave entrance
            ctx.fillStyle = '#1a1a1f';
            ctx.beginPath();
            ctx.ellipse(w / 2, h * 0.35, 180, 140, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Stalactites
            ctx.strokeStyle = '#2a2a30';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(w * 0.2, 0);
            ctx.lineTo(w * 0.2 - 20, h * 0.2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(w * 0.8, 0);
            ctx.lineTo(w * 0.8 + 20, h * 0.15);
            ctx.stroke();
            
            // Glow effect
            ctx.fillStyle = '#6b5b95';
            ctx.beginPath();
            ctx.arc(w * 0.3, h * 0.5, 40, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff6b9d';
            ctx.beginPath();
            ctx.arc(w * 0.7, h * 0.45, 35, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCastle() {
            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(0, 0, w, h * 0.7);
            ctx.fillStyle = '#8b7355';
            ctx.fillRect(0, h * 0.7, w, h * 0.3);
            
            // Castle walls
            ctx.fillStyle = '#a9a9a9';
            ctx.fillRect(w * 0.25, h * 0.3, w * 0.5, h * 0.4);
            
            // Towers
            ctx.fillStyle = '#808080';
            ctx.fillRect(w * 0.15, h * 0.25, 60, h * 0.45);
            ctx.fillRect(w * 0.75, h * 0.25, 60, h * 0.45);
            
            // Tower tops
            ctx.fillStyle = '#696969';
            ctx.beginPath();
            ctx.moveTo(w * 0.15, h * 0.25);
            ctx.lineTo(w * 0.15 + 30, h * 0.1);
            ctx.lineTo(w * 0.15 + 60, h * 0.25);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(w * 0.75, h * 0.25);
            ctx.lineTo(w * 0.75 + 30, h * 0.1);
            ctx.lineTo(w * 0.75 + 60, h * 0.25);
            ctx.fill();
            
            // Main entrance
            ctx.fillStyle = '#2f2f2f';
            ctx.fillRect(w * 0.45, h * 0.5, 60, h * 0.2);
            
            // Gate
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 3;
            ctx.fillStyle = '#8b6914';
            ctx.fillRect(w * 0.47, h * 0.52, 26, h * 0.16);
            ctx.fillRect(w * 0.57, h * 0.52, 26, h * 0.16);
        }

            ctx.fillStyle = '#f5deb3';
            ctx.beginPath();
            ctx.arc(x + 20 * s, y, 18 * s, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 12 * s, y - 6 * s, 4 * s, 4 * s);
            ctx.fillRect(x + 22 * s, y - 6 * s, 4 * s, 4 * s);
            
            // Smile
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 20 * s, y + 2 * s, 6 * s, 0, Math.PI);
            ctx.stroke();
            
            // Body - blue armor
            ctx.fillStyle = '#4169e1';
            ctx.fillRect(x + 8 * s, y + 15 * s, 24 * s, 30 * s);
            
            // Gold trim
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(x + 8 * s, y + 15 * s, 24 * s, 3 * s);
            ctx.fillRect(x + 8 * s, y + 40 * s, 24 * s, 3 * s);
            
            // Arms
            ctx.fillStyle = '#ff6347';
            ctx.fillRect(x + 2 * s, y + 20 * s, 6 * s, 20 * s);
            ctx.fillRect(x + 32 * s, y + 20 * s, 6 * s, 20 * s);
            
            // Legs
            ctx.fillStyle = '#3d3d3d';
            ctx.fillRect(x + 10 * s, y + 45 * s, 7 * s, 20 * s);
            ctx.fillRect(x + 23 * s, y + 45 * s, 7 * s, 20 * s);
            
            // Boots
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(x + 9 * s, y + 65 * s, 9 * s, 5 * s);
            ctx.fillRect(x + 22 * s, y + 65 * s, 9 * s, 5 * s);
        }

        function drawWizard(x, y) {
            const s = 1.5;
            // Pointed hat
            ctx.fillStyle = '#4b0082';
            ctx.beginPath();
            ctx.moveTo(x + 20 * s, y - 15 * s);
            ctx.lineTo(x + 10 * s, y + 5 * s);
            ctx.lineTo(x + 30 * s, y + 5 * s);
            ctx.closePath();
            ctx.fill();
            
            // Hat brim
            ctx.fillStyle = '#6a0dad';
            ctx.beginPath();
            ctx.arc(x + 20 * s, y + 5 * s, 12 * s, 0, Math.PI * 2);
            ctx.fill();
            
            // Head
            ctx.fillStyle = '#fdbcb4';
            ctx.beginPath();
            ctx.arc(x + 20 * s, y + 15 * s, 16 * s, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes - mystical
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 12 * s, y + 10 * s, 5 * s, 5 * s);
            ctx.fillRect(x + 23 * s, y + 10 * s, 5 * s, 5 * s);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 13 * s, y + 11 * s, 2 * s, 2 * s);
            ctx.fillRect(x + 24 * s, y + 11 * s, 2 * s, 2 * s);
            
            // Beard
            ctx.fillStyle = '#d4a5a5';
            ctx.beginPath();
            ctx.arc(x + 20 * s, y + 30 * s, 8 * s, 0, Math.PI);
            ctx.fill();
            
            // Robe
            ctx.fillStyle = '#6a0dad';
            ctx.fillRect(x + 6 * s, y + 30 * s, 28 * s, 35 * s);
            
            // Stars on robe
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(x + 12 * s, y + 40 * s, 3 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 28 * s, y + 45 * s, 3 * s, 0, Math.PI * 2);
            ctx.fill();
            
            // Staff
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(x + 35 * s, y + 25 * s);
            ctx.lineTo(x + 40 * s, y + 60 * s);
            ctx.stroke();
            
            // Staff orb
            ctx.fillStyle = '#ff69b4';
            ctx.beginPath();
            ctx.arc(x + 40 * s, y + 20 * s, 6 * s, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGoblin(x, y) {
            const s = 1.5;
            // Head - green
            ctx.fillStyle = '#6b8e23';
            ctx.beginPath();
            ctx.arc(x + 20 * s, y, 16 * s, 0, Math.PI * 2);
            ctx.fill();
            
            // Ears
            ctx.fillStyle = '#556b2f';
            ctx.beginPath();
            ctx.arc(x + 8 * s, y - 12 * s, 7 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 32 * s, y - 12 * s, 7 * s, 0, Math.PI * 2);
            ctx.fill();
            
            // Crazy eyes
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(x + 12 * s, y - 4 * s, 6 * s, 6 * s);
            ctx.fillRect(x + 22 * s, y - 4 * s, 6 * s, 6 * s);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 13 * s, y - 3 * s, 3 * s, 3 * s);
            ctx.fillRect(x + 24 * s, y - 2 * s, 3 * s, 3 * s);
            
            // Wicked grin
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 20 * s, y + 4 * s, 8 * s, 0, Math.PI);
            ctx.stroke();
            
            // Teeth
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(x + (14 + i * 2.4) * s, y + 4 * s, 1.5 * s, 2 * s);
            }
            
            // Body
            ctx.fillStyle = '#7cb342';
            ctx.fillRect(x + 6 * s, y + 15 * s, 28 * s, 35 * s);
            
            // Claws on chest
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x + 15 * s, y + 25 * s);
            ctx.lineTo(x + 10 * s, y + 32 * s);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 25 * s, y + 25 * s);
            ctx.lineTo(x + 30 * s, y + 32 * s);
            ctx.stroke();
            
            // Legs
            ctx.fillStyle = '#558b2f';
            ctx.fillRect(x + 9 * s, y + 50 * s, 7 * s, 18 * s);
            ctx.fillRect(x + 24 * s, y + 50 * s, 7 * s, 18 * s);
            
            // Feet
            ctx.fillStyle = '#3d5a1f';
            ctx.beginPath();
            ctx.arc(x + 12.5 * s, y + 68 * s, 5 * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 27.5 * s, y + 68 * s, 5 * s, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawScene(sceneKey) {
            const scene = SCENES[sceneKey];
            
            if (scene.background === 'forest') drawForest();
            else if (scene.background === 'cave') drawCave();
            else if (scene.background === 'castle') drawCastle();

            const charX = canvas.width - 140;
            const charY = canvas.height - 180;
            if (scene.character === 'hero') drawHero(charX, charY);
            else if (scene.character === 'wizard') drawWizard(charX, charY);
            else if (scene.character === 'goblin') drawGoblin(charX, charY);

            titleEl.textContent = scene.title;
            storyEl.textContent = scene.text;

            choicesEl.innerHTML = '';
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choiceButton';
                btn.textContent = choice.text;
                btn.onclick = () => {
                    initAudio();
                    playTone(440, 0.08);
                    setTimeout(() => goToScene(choice.target), 50);
                };
                choicesEl.appendChild(btn);
            });
        }

        function goToScene(sceneKey) {
            currentScene = sceneKey;
            drawScene(sceneKey);
        }

        function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            titleEl = document.getElementById('title');
            storyEl = document.getElementById('storyText');
            choicesEl = document.getElementById('choicesContainer');

            resizeCanvas();
            drawScene('intro');

            // Handle viewport changes on mobile
            window.addEventListener('resize', () => {
                resizeCanvas();
                drawScene(currentScene);
            });

            // Handle orientation change
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    resizeCanvas();
                    drawScene(currentScene);
                }, 100);
            });

            // Force layout recalculation when visual viewport changes
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => {
                    resizeCanvas();
                });
            }

            document.addEventListener('touchstart', initAudio, { once: true });
            document.addEventListener('click', initAudio, { once: true });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
