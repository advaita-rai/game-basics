<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#16213e">
    <title>Choose Your Own Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #gameContainer {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: #16213e;
        }

        #canvas {
            flex: 1;
            display: block;
            background: #0f3460;
            width: 100%;
            image-rendering: pixelated;
        }

        #textBox {
            flex-shrink: 0;
            background: #10121b;
            border-top: 2px solid #2f4d8f;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 30vh;
        }

        #title {
            font-size: 14px;
            font-weight: bold;
            color: #f5f6ff;
        }

        #storyText {
            font-size: 12px;
            color: #e8ebff;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        #choicesContainer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .choiceButton {
            padding: 8px 6px;
            background: #2f4d8f;
            color: #fff;
            border: 2px solid #1f3d6f;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .choiceButton:active {
            background: #1f6fbf;
            transform: scale(0.95);
        }

        @media (max-width: 480px) {
            #title { font-size: 12px; }
            #storyText { font-size: 11px; }
            .choiceButton { font-size: 9px; padding: 6px 4px; }
            #choicesContainer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        <div id="textBox">
            <div id="title"></div>
            <div id="storyText"></div>
            <div id="choicesContainer"></div>
        </div>
    </div>

    <script>
        let canvas, ctx, titleEl, storyEl, choicesEl;
        let currentScene = 'intro';
        let audioContext = null;

        const SCENES = {
            intro: {
                title: 'Mystic Forest',
                text: 'You wake up in a misty forest with glowing mushrooms. A path stretches into the distance, while shadows rustle in the trees.',
                background: 'forest',
                character: 'hero',
                choices: [
                    { text: 'Follow the glowing path', target: 'castle' },
                    { text: 'Hide and wait', target: 'cave' }
                ]
            },
            castle: {
                title: 'Castle Gate',
                text: 'A friendly wizard greets you at the castle gate and offers to guide you. You feel a warm energy around you.',
                background: 'castle',
                character: 'wizard',
                choices: [
                    { text: 'Accept the wizard\'s help', target: 'peace' },
                    { text: 'Explore the tower alone', target: 'danger' }
                ]
            },
            cave: {
                title: 'Hidden Cave',
                text: 'You crouch behind a mossy tree and discover a cave entrance. A creature stirs inside, and the air grows cold.',
                background: 'cave',
                character: 'goblin',
                choices: [
                    { text: 'Sneak inside', target: 'danger' },
                    { text: 'Run back to the path', target: 'castle' }
                ]
            },
            peace: {
                title: 'A New Beginning',
                text: 'With the wizard\'s guidance, you step into a bright future. The adventure has only just begun.',
                background: 'castle',
                character: 'hero',
                choices: [
                    { text: 'Play again', target: 'intro' }
                ]
            },
            danger: {
                title: 'Danger Awaits',
                text: 'A shadow leaps from the darkness. You have entered a challenge that will test your courage.',
                background: 'cave',
                character: 'goblin',
                choices: [
                    { text: 'Try again', target: 'intro' }
                ]
            }
        };

        function resizeCanvas() {
            const textBox = document.getElementById('textBox');
            const textBoxHeight = textBox.offsetHeight;
            const containerHeight = window.innerHeight;
            
            canvas.width = window.innerWidth;
            canvas.height = containerHeight - textBoxHeight;
        }

        function initAudio() {
            if (audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.log('Audio unavailable');
            }
        }

        function playTone(freq, dur) {
            if (!audioContext) return;
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + dur);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + dur);
            } catch (e) {}
        }

        function drawForest() {
            const w = canvas.width;
            const h = canvas.height;
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#70abd8');
            grad.addColorStop(1, '#3e5a6b');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#3e5a2d';
            ctx.fillRect(0, h * 0.75, w, h * 0.25);
            const s = w / 1200;
            ctx.fillStyle = '#5c3a18';
            ctx.fillRect(30 * s, h * 0.45, 80 * s, h * 0.55);
            ctx.fillStyle = '#2a7037';
            ctx.beginPath();
            ctx.arc(70 * s, h * 0.45, 50 * s, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCave() {
            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = '#363a49';
            ctx.fillRect(0, 0, w, h * 0.7);
            ctx.fillStyle = '#2e2826';
            ctx.fillRect(0, h * 0.7, w, h * 0.3);
            ctx.fillStyle = '#16161b';
            ctx.beginPath();
            ctx.ellipse(w / 2, h * 0.55, 140, 100, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCastle() {
            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = '#8ec6ff';
            ctx.fillRect(0, 0, w, h * 0.85);
            ctx.fillStyle = '#625f4e';
            ctx.fillRect(0, h * 0.85, w, h * 0.15);
            ctx.fillStyle = '#cdcddee';
            ctx.fillRect(w * 0.5, h * 0.4, 120, h * 0.4);
        }

        function drawHero(x, y) {
            const s = 0.3;
            ctx.fillStyle = '#f3cb9c';
            ctx.beginPath();
            ctx.arc(x + 40 * s, y + 40 * s, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#375dc4';
            ctx.fillRect(x + 20 * s, y + 60 * s, 30 * s, 40 * s);
        }

        function drawWizard(x, y) {
            const s = 0.3;
            ctx.fillStyle = '#2c1861';
            ctx.beginPath();
            ctx.moveTo(x + 30, y);
            ctx.lineTo(x + 50, y + 30);
            ctx.lineTo(x + 10, y + 30);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#ffd7ba';
            ctx.beginPath();
            ctx.arc(x + 30, y + 40, 15, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGoblin(x, y) {
            ctx.fillStyle = '#92c045';
            ctx.beginPath();
            ctx.arc(x + 30, y + 35, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#587c2d';
            ctx.fillRect(x + 20, y + 50, 30, 30);
        }

        function drawScene(sceneKey) {
            const scene = SCENES[sceneKey];
            
            if (scene.background === 'forest') drawForest();
            else if (scene.background === 'cave') drawCave();
            else if (scene.background === 'castle') drawCastle();

            const charX = canvas.width - 150;
            const charY = canvas.height - 200;
            if (scene.character === 'hero') drawHero(charX, charY);
            else if (scene.character === 'wizard') drawWizard(charX, charY);
            else if (scene.character === 'goblin') drawGoblin(charX, charY);

            titleEl.textContent = scene.title;
            storyEl.textContent = scene.text;

            choicesEl.innerHTML = '';
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choiceButton';
                btn.textContent = choice.text;
                btn.onclick = () => {
                    initAudio();
                    playTone(440, 0.08);
                    setTimeout(() => goToScene(choice.target), 50);
                };
                choicesEl.appendChild(btn);
            });
        }

        function goToScene(sceneKey) {
            currentScene = sceneKey;
            drawScene(sceneKey);
        }

        function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            titleEl = document.getElementById('title');
            storyEl = document.getElementById('storyText');
            choicesEl = document.getElementById('choicesContainer');

            resizeCanvas();
            drawScene('intro');

            window.addEventListener('resize', () => {
                resizeCanvas();
                drawScene(currentScene);
            });

            document.addEventListener('touchstart', initAudio, { once: true });
            document.addEventListener('click', initAudio, { once: true });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
